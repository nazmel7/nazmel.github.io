<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 0;
}

/* --- Fullscreen Mobile Style by Default --- */
.popup {
    box-sizing: border-box;
    width: 100vw;
    height: 100vh;
    background: white;
    padding: 40px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: 0;
}

/* --- Desktop Responsive Style --- */
@media (min-width: 768px) {
    .popup {
        width: 380px;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,.3);
        margin: 100px auto;
        display: block; /* Standard layout for desktop box */
    }
}

button {
    padding: 12px 25px;
    background: #00b894;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 15px;
}

small {
    color: red;
}

/* --- Fullscreen Image Styles --- */
.image-overlay {
    display: none; 
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black; 
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.image-content {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.image-content img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
    display: block;
}

@media (min-width: 768px) {
    .image-content img {
        width: 100%;
        height: 100%;
        max-width: 1920px;
        max-height: 1080px;
        object-fit: contain; 
    }
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 118, 117, 0.8);
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-weight: bold;
    font-size: 20px;
    z-index: 1001;
}
</style>
</head>

<body>

<div class="popup">
    <h2>🎉 Congratulations!</h2>
    <p><b>You have won a brand new iPhone!</b></p>
    <p>Your device has been selected as today's lucky winner.</p>
    <p><small>Offer expires in 05:00 minutes.</small></p>
    
    <button onclick="showImagePopup()">
        Claim Now
    </button>
</div>

<div id="imageOverlay" class="image-overlay" onclick="closeImagePopup()">
    <div class="image-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeImagePopup()">&times;</button>
        <img src="images/IMG_0161.jpeg" alt="Surprise Gorilla">
    </div>
</div>

<script>
function showImagePopup() {
    document.getElementById('imageOverlay').style.display = 'flex';
}

function closeImagePopup() {
    document.getElementById('imageOverlay').style.display = 'none';
}
</script>

</body>
</html>
