<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family: Arial;
    background:#f0f0f0;
    margin: 0;
    padding: 0;
}

.popup{
    width:380px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    padding:20px;
    text-align:center;
    margin:100px auto;
}

button{
    padding:12px 25px;
    background:#00b894;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

small{
    color:red;
}

/* --- New styles for the Image Popup Overlay --- */
.image-overlay {
    display: none; /* Hidden by default */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8); /* Dark semi-transparent background */
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.image-content {
    background: white;
    padding: 15px;
    border-radius: 10px;
    position: relative;
    max-width: 90%;
    max-height: 90%;
    text-align: center;
}

.image-content img {
    max-width: 400px;
    width: 100%;
    height: auto;
    border-radius: 5px;
    display: block;
}

.close-btn {
    position: absolute;
    top: -10px;
    right: -10px;
    background: #ff7675;
    color: white;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="popup">
    <h2>🎉 Congratulations!</h2>
    <p><b>You have won a brand new iPhone!</b></p>
    <p>Your device has been selected as today's lucky winner.</p>
    <p><small>Offer expires in 05:00 minutes.</small></p>
    
    <button onclick="showImagePopup()">
        Claim Now
    </button>
</div>

<div id="imageOverlay" class="image-overlay" onclick="closeImagePopup()">
    <div class="image-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeImagePopup()">&times;</button>
        <img src="images/IMG_0161.jpeg" alt="Surprise Gorilla">

    </div>
</div>

<script>
// Functions to control the popup visibility
function showImagePopup() {
    document.getElementById('imageOverlay').style.display = 'flex';
}

function closeImagePopup() {
    document.getElementById('imageOverlay').style.display = 'none';
}
</script>

</body>
</html>
