<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name | Portfolio</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      align-items: center;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #cbd5f5;
      transition: 0.3s;
    }

    nav a:hover {
      color: white;
    }

    .hero {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .hero span {
      color: #38bdf8;
    }

    .hero p {
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 25px;
      background: #38bdf8;
      color: black;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    <h1>YourLogo</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Hello, I'm <span>Nazmel</span></h2>
      <p>.</p>
      <a href="#" class="btn">View My Work</a>
    </div>
  </section>

  <footer>
    © 2026 Your Name. All rights reserved.
  </footer>

</body>
</html>
