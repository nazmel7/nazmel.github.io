<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family: Arial;
    background:#f0f0f0;
    margin: 0;
    padding: 0;
}

.popup{
    width:380px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    padding:20px;
    text-align:center;
    margin:100px auto;
}

button{
    padding:12px 25px;
    background:#00b894;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

small{
    color:red;
}

/* --- Fullscreen Styles --- */
.image-overlay {
    display: none; /* Hidden by default */
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black; /* Dark background behind the image */
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.image-content {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Default styling optimized for mobile phones */
.image-content img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
    display: block;
}

/* --- Responsive fix for Desktop / PC --- */
@media (min-width: 768px) {
    .image-content img {
        width: 100%;
        height: 100%;
        max-width: 1920px;
        max-height: 1080px;
        object-fit: contain; /* Prevents awkward cropping on large screens */
    }
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 118, 117, 0.8);
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-weight: bold;
    font-size: 20px;
    z-index: 1001;
}
</style>
</head>

<body>

<div class="popup">
    <h2>🎉 Congratulations!</h2>
    <p><b>You have won a brand new iPhone!</b></p>
    <p>Your device has been selected as today's lucky winner.</p>
    <p><small>Offer expires in 05:00 minutes.</small></p>
    
    <button onclick="showImagePopup()">
        Claim Now
    </button>
</div>

<div id="imageOverlay" class="image-overlay" onclick="closeImagePopup()">
    <div class="image-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeImagePopup()">&times;</button>
        <img src="images/IMG_0161.jpeg" alt="Surprise Gorilla">
    </div>
</div>

<script>
function showImagePopup() {
    document.getElementById('imageOverlay').style.display = 'flex';
}

function closeImagePopup() {
    document.getElementById('imageOverlay').style.display = 'none';
}
</script>

</body>
</html>
