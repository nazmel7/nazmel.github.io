<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Info365 Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

h1{
    font-size:40px;
    margin-bottom:20px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:10px;
    background:#007aff;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    opacity:.8;
}

#meme{
    display:none;
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:black;
}
</style>

</head>

<body>

<div class="container" id="page">
    <h1>Info365 System</h1>
    <p style="margin-bottom:25px;">
        Click continue to view your result
    </p>

    <button onclick="showMeme()">
        Continue
    </button>
</div>

<img id="meme" src="images/IMG_0161.jpeg" alt="Meme">

<script>
function showMeme(){

    document.getElementById("page").style.display="none";

    document.getElementById("meme").style.display="block";

}
</script>

</body>
</html>
