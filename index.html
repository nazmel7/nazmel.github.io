<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name | Portfolio</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: white;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 25px 60px;
      position: fixed;
      width: 100%;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.3);
      z-index: 1000;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: #cbd5f5;
      transition: 0.3s;
    }

    nav a:hover {
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      padding: 0 20px;
    }

    .hero h2 {
      font-size: 55px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
    }

    .hero h2 span {
      color: #38bdf8;
    }

    .hero p {
      margin-top: 15px;
      color: #94a3b8;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.3s;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 28px;
      background: #38bdf8;
      color: black;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.6s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    /* floating blur circles */
    .blur {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: float 10s infinite alternate;
    }

    .blur1 {
      width: 300px;
      height: 300px;
      background: #38bdf8;
      top: 10%;
      left: 10%;
    }

    .blur2 {
      width: 250px;
      height: 250px;
      background: #a855f7;
      bottom: 10%;
      right: 10%;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      from {
        transform: translateY(0px);
      }
      to {
        transform: translateY(-50px);
      }
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- background effects -->
  <div class="blur blur1"></div>
  <div class="blur blur2"></div>

  <header>
    <h1></h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Hello, I'm <span>Muhammad Nazmel Anaqiw</span></h2>
    <a href="#" class="btn">View My Work</a>
  </section>

  <footer>
    © 2026 Muhammad Nazmel Anaqi. All rights reserved.
  </footer>

</body>
</html>
