<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack3d By Benjamin</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        /* Redesigned Background Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            max-width: 95%;
            width: 900px;
        }

        .top-header {
            color: #ff0000;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
        }

        .logo-container {
            margin-bottom: 35px;
        }

        .hacker-logo {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 2px solid #3a3a3a;
            background: #000000;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .emblem-placeholder {
            color: #8a8a8a;
            font-size: 10px;
            font-family: 'Share Tech Mono', monospace;
            border: 1px dashed #333;
            padding: 20px;
            border-radius: 50%;
            width: 140px;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.3;
        }
        
        .emblem-placeholder span {
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .main-subtitle {
            font-size: 1.8rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .main-subtitle span {
            color: #008000; /* Darker green matching the reference image */
            text-shadow: 0 0 5px rgba(0, 128, 0, 0.5);
        }

        .agency-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            margin-bottom: 10px;
        }

        .dots-separator {
            color: #ff0000;
            letter-spacing: 4px;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .manifesto {
            font-family: 'Share Tech Mono', monospace;
            color: #00ffff; /* Cyber cyan text color */
            font-size: 1.25rem;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        .manifesto p {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

        <h1 class="top-header">Hack3d By Benjamin</h1>

        <div class="logo-container">
            <div class="hacker-logo">
                <div class="emblem-placeholder">
                    🦅 <br>
                    National Hackers Agency
                    <span>N5A</span>
                </div>
            </div>
        </div>

        <h2 class="main-subtitle">Your System <span>Hacked By</span></h2>

            <p>We Do Not Forgive . . .</p>
            <p>Expect Us...</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('backgroundCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configuration to accurately mimic the reference image lines
        const lineCount = 85; 
        const lines = [];

        for (let i = 0; i < lineCount; i++) {
            lines.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                length: Math.random() * 120 + 60, // Sharper, longer line segments
                speed: Math.random() * 4 + 2,     // Quick falling pace
                opacity: Math.random() * 0.4 + 0.15
            });
        }

        function drawBackground() {
            // Keep the baseline pitch black
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw the neon digital light lines
            for (let i = 0; i < lineCount; i++) {
                let l = lines[i];

                // Create a fade trail for the neon digital lines
                let lineGrad = ctx.createLinearGradient(l.x, l.y, l.x, l.y + l.length);

                ctx.strokeStyle = lineGrad;
