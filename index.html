<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack3d By 0xManaP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        /* Redesigned Background Canvas - Crimson Storm */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            max-width: 95%;
            width: 900px;
        }

        .top-header {
            color: #ff0000;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
        }

        /* Custom Centered Logo Styling with Ambient Glow */
        .logo-container {
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hacker-logo {
            width: auto;
            max-width: 320px; /* Perfectly scales your dynamic logo */
            height: auto;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 25px rgba(255, 0, 50, 0.5)); /* Intense red aura */
        }

        .hacker-logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .main-subtitle {
            font-size: 1.8rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .main-subtitle span {
            color: #ff0000; /* Shifted to clean red accent */
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
        }

        .agency-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            margin-bottom: 10px;
        }

        .dots-separator {
            color: #ff0000;
            letter-spacing: 6px;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .manifesto {
            font-family: 'Share Tech Mono', monospace;
            color: #ff4d4d; /* High visibility red/tint text */
            font-size: 1.25rem;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        .manifesto p {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <canvas id="backgroundCanvas"></canvas>

    <div class="content-wrapper">
        <h1 class="top-header">Hack3d By 0xManaP</h1>

        <div class="logo-container">
            <div class="hacker-logo">
                <img src="https://cdn.discordapp.com/attachments/984426192566366218/1526175979532193912/image-Photoroom.png?ex=6a5611a4&is=6a54c024&hm=dba7627af122e3ee246b88a1ddbc40dc6660399520cbd09aeabddca0f37b6415&" alt="ZeroDay Syndicate Logo">
            </div>
        </div>

        <h2 class="main-subtitle">Your System <span>Hacked By</span></h2>
        <h1 class="agency-title">ZeroDay Syndicate</h1>
        
        <div class="dots-separator">☠️•••••••••• ••••••••••☠️</div>

        <div class="manifesto">
            <p>Dear Admin Your Protection Is Hacked . . .</p>
            <p>NO SYSTEM IS SAFE . . .</p>
            <p>We Do Not Forget . . .</p>
            <p>We Do Not Forgive . . .</p>
            <p>Expect Us...</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('backgroundCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configurations for the crimson rain trails
        const lineCount = 90; 
        const lines = [];

        for (let i = 0; i < lineCount; i++) {
            lines.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                length: Math.random() * 130 + 70, 
                speed: Math.random() * 4 + 2,     
                opacity: Math.random() * 0.4 + 0.15
            });
        }

        function drawBackground() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw the pure red digital rain
            for (let i = 0; i < lineCount; i++) {
                let l = lines[i];

                let lineGrad = ctx.createLinearGradient(l.x, l.y, l.x, l.y + l.length);
                lineGrad.addColorStop(0, 'rgba(255, 0, 0, 0)'); 
                lineGrad.addColorStop(0.7, `rgba(255, 50, 50, ${l.opacity})`); 
                lineGrad.addColorStop(1, `rgba(200, 0, 0, ${l.opacity * 1.6})`); 

                ctx.beginPath();
                ctx.strokeStyle = lineGrad;
                ctx.lineWidth = 1.3; 
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x, l.y + l.length);
                ctx.stroke();

                l.y += l.speed;

                if (l.y > canvas.height) {
                    l.y = -l.length;
                    l.x = Math.random() * canvas.width;
                    l.speed = Math.random() * 4 + 2;
                }
            }

            requestAnimationFrame(drawBackground);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        drawBackground();
    </script>
</body>
</html>
