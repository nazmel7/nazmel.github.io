<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM COMPROMISED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #0f0;
        }

        /* Matrix rain canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }

        /* Main overlay container */
        .terminal-container {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 80%);
            padding: 20px;
            text-align: center;
        }

        /* Glitch Effect Box */
        .glitch-wrapper {
            padding: 20px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px #ff0055, inset 0 0 20px #ff0055;
            background: rgba(15, 0, 5, 0.8);
            max-width: 700px;
            width: 100%;
            border-radius: 5px;
            animation: flicker 0.15s infinite;
        }

        .skull-art {
            font-size: 10px;
            white-space: pre;
            line-height: 10px;
            color: #ff0055;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #ff0055;
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #888;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .status-box {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #0f0;
            padding: 15px;
            text-align: left;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .status-line {
            margin: 5px 0;
            font-size: 0.9rem;
        }

        .status-line span.success { color: #0f0; }
        .status-line span.danger { color: #ff0055; font-weight: bold; }

        .warning-text {
            color: #ffcc00;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 5px #ffcc00;
            animation: pulse 1.5s infinite;
        }

        /* Animations */
        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Scanline effect */
        .terminal-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="terminal-container">
        <div class="glitch-wrapper">
            <div class="skull-art">
     .---.
    /     \
    | () () |
     \  ^  /
      |||||
      |||||
            </div>

            <h1>SYSTEM COMPROMISED</h1>
            <p>Your security layers have been bypassed. Database extraction complete.</p>

            <div class="status-box">
                <div class="status-line">&gt; Bypassing firewall... <span class="success">[SUCCESS]</span></div>
                <div class="status-line">&gt; Injecting payload... <span class="success">[DONE]</span></div>
                <div class="status-line">&gt; Root privileges... <span class="success">[GRANTED]</span></div>
                <div class="status-line">&gt; Encrypting system files... <span class="danger">[100%]</span></div>
            </div>

            <div class="warning-text">
                OWNED BY 0xManaP
            </div>
        </div>
    </div>

    <script>
        // Matrix Rain Background Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+~`|}{[]:;?><,./-=";
        const fontSize = 14;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for(let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(draw, 30);
    </script>
</body>
</html>
